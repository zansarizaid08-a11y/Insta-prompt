<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Explorer</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        .search-section {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            text-align: center;
        }

        input {
            width: 70%;
            padding: 12px 20px;
            border-radius: 30px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 16px;
        }

        button {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        /* Explore View Styling (Screenshot Style) */
        .explore-item {
            background: var(--glass);
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .image-container {
            width: 40%;
            position: relative;
            min-height: 250px;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }

        .video-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #ff0050;
            border: 1px solid #ff0050;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .content-container {
            width: 60%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .content-container h3 { margin-top: 0; color: #60a5fa; }

        .prompt-box {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            font-size: 14px;
            margin: 10px 0;
            border-left: 4px solid var(--primary);
        }

        /* Modal / Detail View */
        #detailView {
            display: none;
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            overflow-y: auto;
            padding: 40px 20px;
        }

        .modal-content {
            max-width: 600px;
            margin: 0 auto;
            background: #1e293b;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        @media (max-width: 600px) {
            .explore-item { flex-direction: column; }
            .image-container, .content-container { width: 100%; }
            input { width: 100%; margin-bottom: 10px; }
        }

        footer { text-align: center; padding: 50px; opacity: 0.6; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI Prompt Hub</h1>
        <p>Search by Instagram or Explore All Designs</p>
    </header>

    <div class="search-section">
        <input type="text" id="instaInput" placeholder="Paste Instagram URL here...">
        <button onclick="searchData()">Search</button>
        <button onclick="loadExplore()" style="background: #334155;">Explore All</button>
    </div>

    <div id="displayArea"></div>

    <hr style="margin: 50px 0; border: 0.5px solid rgba(255,255,255,0.1);">
    <div id="footer-links" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; font-size: 13px;">
        <div>
            <h4>Pages</h4>
            <p>Privacy Policy</p>
            <p>Terms of Service</p>
            <p>Disclaimer</p>
        </div>
        <div>
            <h4>Latest Blogs</h4>
            <p>How to use AI Prompts</p>
            <p>Best Instagram Reel Ideas</p>
        </div>
    </div>

    <footer>© 2026 AI Hub - GitHub Pages Ready</footer>
</div>

<div id="detailView">
    <div class="modal-content">
        <button onclick="closeModal()" style="position: absolute; right: 15px; top: 15px; z-index: 10;">✕ Close</button>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    let dbData = [];

    // Fetch Database
    async function init() {
        try {
            const res = await fetch('./database.json');
            dbData = await res.json();
        } catch (e) {
            console.error("Database not found");
        }
    }

    function searchData() {
        const url = document.getElementById('instaInput').value.trim();
        const found = dbData.find(item => item.instagram === url);
        renderResults(found ? [found] : []);
    }

    function loadExplore() {
        renderResults(dbData);
    }

    function renderResults(dataList) {
        const container = document.getElementById('displayArea');
        container.innerHTML = '';

        if (dataList.length === 0) {
            container.innerHTML = '<p style="text-align:center;">No results found.</p>';
            return;
        }

        dataList.forEach(user => {
            user.data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'explore-item';
                card.innerHTML = `
                    <div class="image-container">
                        <a href="${user.instagram}" target="_blank" class="video-btn">▶ Watch Video</a>
                        <img src="${item.image}" onclick="openModal('${item.image}', \`${item.prompt}\`, '${user.instagram}')">
                    </div>
                    <div class="content-container">
                        <h3>AI Prompt Design</h3>
                        <p style="font-size:12px; opacity:0.7;">Source: ${user.instagram.split('/')[3]}</p>
                        <div class="prompt-box">${item.prompt}</div>
                        <button onclick="copyPrompt(\`${item.prompt}\`)">Copy Prompt</button>
                    </div>
                `;
                container.appendChild(card);
            });
        });
    }

    function openModal(img, prompt, url) {
        const modal = document.getElementById('detailView');
        const body = document.getElementById('modalBody');
        body.innerHTML = `
            <img src="${img}" style="width:100%;">
            <div style="padding:20px;">
                <a href="${url}" target="_blank" style="color:#ff0050; text-decoration:none; font-weight:bold;">▶ Watch Example Video</a>
                <div class="prompt-box" style="margin-top:20px;">${prompt}</div>
                <button onclick="copyPrompt(\`${prompt}\`)" style="width:100%;">Copy This Prompt</button>
            </div>
        `;
        modal.style.display = 'block';
    }

    function closeModal() {
        document.getElementById('detailView').style.display = 'none';
    }

    function copyPrompt(text) {
        navigator.clipboard.writeText(text);
        alert('Prompt copied to clipboard!');
    }

    window.onload = init;
</script>

</body>
</html>
