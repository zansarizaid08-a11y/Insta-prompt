<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Hub - Premium</title>
    
    <script type='text/javascript' src='//pl25750104.effectivegatecpm.com/c6/e7/7f/c6e77f5c1efceb275ad6696551624641.js'></script>

    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #3b82f6;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.5; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: #0f172a; border-bottom: 1px solid #334155;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .logo img { width: 32px; height: 32px; border-radius: 50%; }

        .category-wrapper {
            position: sticky; top: 65px; z-index: 999;
            background: #0f172a; padding: 12px 0;
            border-bottom: 1px solid #334155;
        }
        .category-scroll {
            display: flex; gap: 10px; overflow-x: auto;
            padding: 0 5%; scrollbar-width: none;
        }
        .category-scroll::-webkit-scrollbar { display: none; }
        
        .cat-btn {
            background: #1e293b; color: white; border: 1px solid #334155;
            padding: 7px 18px; border-radius: 20px; font-size: 0.85rem;
            white-space: nowrap; cursor: pointer; transition: 0.3s;
        }
        .cat-btn.active { background: white; color: black; border-color: white; font-weight: bold; }

        .container { max-width: 1000px; margin: 0 auto; padding: 15px; }
        header { text-align: center; padding: 1rem 0; }
        h1 { font-size: 2rem; margin-bottom: 1rem; color: #a5b4fc; font-weight: 700; }

        .search-container { display: flex; gap: 8px; margin-bottom: 20px; max-width: 600px; margin: auto; }
        input[type="text"] { 
            flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #334155; 
            background: #1e293b; color: white; outline: none;
        }
        .search-btn { background: var(--secondary); color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; }

        #results-area {
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 15px; margin-top: 10px;
        }

        .prompt-card { 
            background: var(--card-bg); border-radius: 15px; overflow: hidden; 
            display: flex; flex-direction: column; border: 1px solid #334155;
            position: relative;
        }
        /* Highlight effect for linked prompt */
        .prompt-card.highlight { border: 2px solid var(--secondary); box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }

        .image-box { position: relative; width: 100%; aspect-ratio: 1/1; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .share-btn-floating {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.6); color: white; border: none;
            width: 32px; height: 32px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 14px; z-index: 10;
        }

        .content-box { padding: 10px; }
        .prompt-title { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .btn-group { display: flex; gap: 5px; }
        .btn-card { 
            flex: 1; padding: 8px 2px; border-radius: 6px; border: none; 
            font-size: 0.7rem; font-weight: 700; cursor: pointer; text-align: center;
            text-decoration: none; color: white;
        }
        .copy-btn { background: #334155; }
        .watch-btn { background: var(--secondary); }

        #toast { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: #10b981; color: white; padding: 10px 20px; 
            border-radius: 50px; display: none; z-index: 2000;
        }

        @media (max-width: 600px) { h1 { font-size: 1.6rem; } }
    </style>
</head>
<body>

<nav>
    <div class="logo"><img src="https://i.ibb.co/m5pXz1D/instagram-logo.png"> AI PROMPT HUB</div>
    <div>&#9776;</div>
</nav>

<div class="category-wrapper">
    <div class="category-scroll" id="cat-list">
        <button class="cat-btn active" onclick="filterData('All', this)">All</button>
    </div>
</div>

<div class="container">
    <header>
        <h1>Discover Premium Prompts</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search prompts...">
            <button class="search-btn" onclick="handleSearch()">Search</button>
        </div>
    </header>
    <div id="results-area"></div>
</div>

<div id="toast">Link Copied!</div>

<script>
    let db = [];
    let flatData = [];

    async function init() {
        try {
            const res = await fetch('./database.json');
            if(res.ok) { 
                db = await res.json(); 
                // Data ko flat array mein convert karein
                db.forEach(user => {
                    user.data.forEach(item => {
                        flatData.push({ ...item, instagram: user.instagram });
                    });
                });
            }
            createCategoryButtons();
            
            // Check if URL has ID (e.g., #p101)
            const targetId = window.location.hash.replace('#', '');
            renderData(flatData, targetId);
        } catch (e) { console.error("Database load error"); }
    }

    function createCategoryButtons() {
        const catList = document.getElementById('cat-list');
        const categories = [...new Set(db.map(item => item.category).filter(c => c))];
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn';
            btn.innerText = cat;
            btn.onclick = (e) => filterData(cat, e.target);
            catList.appendChild(btn);
        });
    }

    function filterData(category, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filtered = (category === 'All') ? flatData : flatData.filter(item => db.find(u => u.category === category && u.data.includes(item)));
        // Filter karne par hash clear kar dein taaki naya shuffle ho
        window.location.hash = '';
        renderData(filtered);
    }

    function renderData(list, priorityId = null) {
        const area = document.getElementById('results-area');
        area.innerHTML = '';
        
        let itemsToRender = [...list];
        let priorityItem = null;

        // 1. Agar koi ID di gayi hai, toh use dhoondhein
        if (priorityId) {
            priorityItem = itemsToRender.find(i => i.id === priorityId);
            if (priorityItem) {
                // List se hata dein taaki shuffle mein dobara na aaye
                itemsToRender = itemsToRender.filter(i => i.id !== priorityId);
            }
        }

        // 2. Baki bachay hue items ko shuffle karein
        for (let i = itemsToRender.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [itemsToRender[i], itemsToRender[j]] = [itemsToRender[j], itemsToRender[i]];
        }

        // 3. Agar priority item mila, toh use sabse upar daalein
        if (priorityItem) {
            itemsToRender.unshift(priorityItem);
        }

        // 4. Render HTML
        itemsToRender.forEach((item, index) => {
            const isHighlighted = item.id === priorityId ? 'highlight' : '';
            const card = document.createElement('div');
            card.className = `prompt-card ${isHighlighted}`;
            card.id = item.id;
            card.innerHTML = `
                <div class="image-box">
                    <button class="share-btn-floating" onclick="copyShareLink('${item.id}')">🔗</button>
                    <img src="${item.image}" loading="lazy">
                </div>
                <div class="content-box">
                    <div class="prompt-title">/ prompt-text</div>
                    <div class="btn-group">
                        <button class="btn-card copy-btn" onclick="copyPrompt(\`${item.prompt}\`)">Copy</button>
                        <a href="${item.instagram}" target="_blank" class="btn-card watch-btn">Watch</a>
                    </div>
                </div>
            `;
            area.appendChild(card);
            
            // Ad after 2nd card
            if (index === 1) insertAd(area);
        });
    }

    function copyShareLink(id) {
        const link = window.location.origin + window.location.pathname + '#' + id;
        navigator.clipboard.writeText(link);
        showToast("Link Copied to Share!");
    }

    function copyPrompt(txt) {
        navigator.clipboard.writeText(txt);
        showToast("Prompt Copied!");
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function insertAd(area) {
        const ad = document.createElement('div');
        ad.className = 'native-ad-container';
        ad.innerHTML = `<script async src="//pl28750234.effectivegatecpm.com/15b9c32f55639f994ab49336ecb3dd5c/invoke.js"><\/script>`;
        area.appendChild(ad);
    }

    function handleSearch() {
        const val = document.getElementById('search-input').value.toLowerCase();
        const filtered = flatData.filter(i => i.prompt.toLowerCase().includes(val));
        renderData(filtered);
    }

    window.onload = init;
</script>

</body>
</html>
