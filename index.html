<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Hub - Premium</title>
    
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #3b82f6;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem; background: #0f172a; border-bottom: 1px solid #334155;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .logo img { width: 30px; height: 30px; border-radius: 50%; }

        .container { max-width: 1000px; margin: 0 auto; padding: 15px; }

        header { text-align: center; padding: 2rem 0; }
        h1 { font-size: 2rem; margin-bottom: 1.5rem; color: #a5b4fc; }

        /* Search Box */
        .search-container { display: flex; gap: 8px; margin-bottom: 20px; }
        input[type="text"] { 
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155; 
            background: #1e293b; color: white; outline: none; 
        }
        .search-btn { background: var(--secondary); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; }

        /* --- GRID LAYOUT (2 Columns for Mobile & Desktop) --- */
        #results-area {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Hamesha 2 column dikhega */
            gap: 12px;
            margin-top: 20px;
        }

        .prompt-card { 
            background: var(--card-bg); border-radius: 12px; overflow: hidden; 
            display: flex; flex-direction: column; border: 1px solid #334155;
        }

        .image-box { position: relative; width: 100%; aspect-ratio: 4/5; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }

        .video-label { 
            position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.6); 
            color: #ff4d4d; border: 1px solid #ff4d4d; padding: 2px 6px; 
            border-radius: 4px; font-size: 10px; font-weight: bold; 
        }

        .content-box { padding: 10px; text-align: left; }
        .prompt-title { 
            font-size: 0.85rem; color: var(--text-muted); 
            margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* --- BUTTONS --- */
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn-card { 
            flex: 1; padding: 8px 5px; border-radius: 6px; border: none; 
            font-size: 0.75rem; font-weight: 600; cursor: pointer; text-align: center;
            text-decoration: none; display: inline-block;
        }
        .copy-btn { background: #334155; color: white; }
        .watch-btn { background: var(--secondary); color: white; }

        /* Toast Notification */
        #toast { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: #10b981; color: white; padding: 10px 20px; 
            border-radius: 8px; display: none; z-index: 2000;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .btn-card { font-size: 0.7rem; padding: 6px 2px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">
        <img src="https://via.placeholder.com/50" alt="Logo"> AI PROMPT HUB
    </div>
    <div style="font-size: 1.5rem;">&#9776;</div>
</nav>

<div class="container">
    <header>
        <h1>Discover Premium Prompts</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Paste Instagram Link...">
            <button class="search-btn" onclick="handleSearch()">Search</button>
        </div>
        
        <a href="#" style="background:#ef4444; color:white; padding:10px 20px; border-radius:8px; text-decoration:none; font-weight:bold; font-size:0.9rem;">
            🔥 TRENDING AI TOOLS (2026)
        </a>
    </header>

    <div id="results-area">
        </div>
</div>

<div id="toast">Copied to Clipboard!</div>

<script>
    // Sample Data (Yeh aapki database.json se aayega)
    let db = [
        {
            "instagram": "https://instagram.com/reel/sample1",
            "data": [
                {
                    "image": "https://via.placeholder.com/400x500",
                    "prompt": "Create a 3D illustration of a young couple sitting on a wooden log with heart bokeh background..."
                },
                {
                    "image": "https://via.placeholder.com/400x500",
                    "prompt": "Cyberpunk style portrait of a girl with neon lights..."
                }
            ]
        }
    ];

    async function init() {
        try {
            const res = await fetch('./database.json');
            if(res.ok) db = await res.json();
        } catch (e) { console.log("Using local sample data"); }
        renderData(db);
    }

    function renderData(list) {
        const area = document.getElementById('results-area');
        area.innerHTML = '';
        
        list.forEach((user) => {
            user.data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'prompt-card';
                card.innerHTML = `
                    <div class="image-box">
                        <span class="video-label">▶ REEL</span>
                        <img src="${item.image}">
                    </div>
                    <div class="content-box">
                        <div class="prompt-title">/ prompt-text</div>
                        <div class="btn-group">
                            <button class="btn-card copy-btn" onclick="copyText(\`${item.prompt}\`)">Copy Prompt</button>
                            <a href="${user.instagram}" target="_blank" class="btn-card watch-btn">Watch Video</a>
                        </div>
                    </div>
                `;
                area.appendChild(card);
            });
        });
    }

    function handleSearch() {
        const val = document.getElementById('search-input').value.toLowerCase();
        const filtered = db.filter(u => u.instagram.toLowerCase().includes(val));
        renderData(filtered);
    }

    function copyText(txt) {
        navigator.clipboard.writeText(txt);
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    window.onload = init;
</script>

</body>
</html>
