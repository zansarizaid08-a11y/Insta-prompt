<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Hub - Premium</title>
    
    <script type='text/javascript' src='https://pl25750104.effectivegatecpm.com/c6/e7/7f/c6e77f5c1efceb275ad6696551624641.js'></script>

    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #3b82f6;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: #0f172a; border-bottom: 1px solid #334155;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        /* INSTAGRAM LOGO (From Screenshot 1000061591) */
        .logo img { width: 32px; height: 32px; filter: invert(1); }

        .container { max-width: 1000px; margin: 0 auto; padding: 15px; }

        header { text-align: center; padding: 1.5rem 0; }
        h1 { font-size: 2rem; margin-bottom: 1.5rem; color: #a5b4fc; }

        .search-container { display: flex; gap: 8px; margin-bottom: 20px; max-width: 500px; margin-left: auto; margin-right: auto; }
        input[type="text"] { 
            flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #334155; 
            background: #1e293b; color: white; outline: none; 
        }
        .search-btn { background: var(--secondary); color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; }

        /* DIRECT LINK BUTTON (Screenshot 1000061354) */
        .trending-link {
            background:#ef4444; color:white; padding:10px 20px; 
            border-radius:8px; text-decoration:none; font-weight:bold; 
            font-size:0.8rem; display: inline-block; margin-bottom: 20px;
        }

        /* GRID LAYOUT (2 Columns) */
        #results-area {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
        }

        .prompt-card { 
            background: var(--card-bg); border-radius: 12px; overflow: hidden; 
            display: flex; flex-direction: column; border: 1px solid #334155;
        }

        .image-box { position: relative; width: 100%; aspect-ratio: 1/1; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }

        .video-label { 
            position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); 
            color: #ff4d4d; border: 1px solid #ff4d4d; padding: 2px 6px; 
            border-radius: 4px; font-size: 9px; font-weight: bold; 
        }

        .content-box { padding: 10px; }
        .prompt-title { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .btn-group { display: flex; gap: 5px; }
        .btn-card { 
            flex: 1; padding: 8px 2px; border-radius: 6px; border: none; 
            font-size: 0.7rem; font-weight: bold; cursor: pointer; text-align: center;
            text-decoration: none; color: white;
        }
        .copy-btn { background: #334155; }
        .watch-btn { background: var(--secondary); }

        /* AD CONTAINER (Har 4 cards ke baad) */
        .ad-slot { 
            grid-column: span 2; 
            margin: 10px 0; 
            min-height: 200px; 
            background: rgba(255,255,255,0.02);
            display: flex; justify-content: center; align-items: center;
        }

        #toast { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: #10b981; color: white; padding: 10px 20px; 
            border-radius: 50px; display: none; z-index: 2000;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">
        <img src="https://i.ibb.co/m5pXz1D/instagram-logo.png" alt="Logo"> AI PROMPT HUB
    </div>
    <div style="font-size: 1.5rem; cursor: pointer;">&#9776;</div>
</nav>

<div class="container">
    <header>
        <h1>Discover Premium Prompts</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Paste Instagram Link...">
            <button class="search-btn" onclick="handleSearch()">Search</button>
        </div>
        
        <a href="https://www.effectivegatecpm.com/z5q9i3x45w?key=06adf9977ec69fdce5fef572556a5d88" target="_blank" class="trending-link">
            🔥 TRENDING AI TOOLS (2026)
        </a>
    </header>

    <div id="results-area"></div>
</div>

<div id="toast">Copied to Clipboard!</div>

<script>
    let db = [];

    async function init() {
        try {
            const res = await fetch('./database.json');
            db = await res.json();
            renderData(db);
        } catch (e) {
            console.log("Database load fail, using sample data.");
            // Sample data for testing
            db = [{"instagram": "https://instagram.com", "data": Array(12).fill({"image": "https://via.placeholder.com/400", "prompt": "Sample prompt text here..."})}];
            renderData(db);
        }
    }

    function renderData(list) {
        const area = document.getElementById('results-area');
        area.innerHTML = '';
        let totalCards = 0;

        list.forEach((user) => {
            user.data.forEach(item => {
                totalCards++;
                
                // 1. Create Card
                const card = document.createElement('div');
                card.className = 'prompt-card';
                card.innerHTML = `
                    <div class="image-box">
                        <span class="video-label">▶ REEL</span>
                        <img src="${item.image}" loading="lazy">
                    </div>
                    <div class="content-box">
                        <div class="prompt-title">/ prompt-text</div>
                        <div class="btn-group">
                            <button class="btn-card copy-btn" onclick="copyText(\`${item.prompt}\`)">Copy Prompt</button>
                            <a href="${user.instagram}" target="_blank" class="btn-card watch-btn">Watch Video</a>
                        </div>
                    </div>
                `;
                area.appendChild(card);

                // 2. Logic: Har 4 cards ke baad Native Ad (Screenshot 1000061592 ID use kiya)
                if (totalCards % 4 === 0) {
                    const adSlot = document.createElement('div');
                    adSlot.className = 'ad-slot';
                    
                    // Native Ad unique implementation
                    const script = document.createElement('script');
                    script.async = true;
                    script.dataset.cfasync = "false";
                    script.src = "//pl28750234.effectivegatecpm.com/15b9c32f55639f994ab49336ecb3dd5c/invoke.js";
                    
                    const container = document.createElement('div');
                    container.id = `container-15b9c32f55639f994ab49336ecb3dd5c`;
                    
                    adSlot.appendChild(script);
                    adSlot.appendChild(container);
                    area.appendChild(adSlot);
                }
            });
        });
    }

    function copyText(txt) {
        navigator.clipboard.writeText(txt);
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function handleSearch() {
        const val = document.getElementById('search-input').value.toLowerCase();
        const filtered = db.filter(u => u.instagram.toLowerCase().includes(val));
        renderData(filtered);
    }

    window.onload = init;
</script>

</body>
</html>
