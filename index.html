<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Hub - Premium</title>
    
    <script type='text/javascript' src='//pl25750104.effectivegatecpm.com/c6/e7/7f/c6e77f5c1efceb275ad6696551624641.js'></script>

    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #3b82f6;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.5; }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: #0f172a; border-bottom: 1px solid #334155;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        /* 2. INSTAGRAM LOGO (From Screenshot) */
        .logo img { width: 32px; height: 32px; border-radius: 50%; }

        .container { max-width: 1000px; margin: 0 auto; padding: 15px; }

        header { text-align: center; padding: 2rem 0; }
        h1 { font-size: 2.2rem; margin-bottom: 1.5rem; color: #a5b4fc; font-weight: 700; }

        /* Search Box */
        .search-container { display: flex; gap: 8px; margin-bottom: 20px; max-width: 600px; margin-left: auto; margin-right: auto; }
        input[type="text"] { 
            flex: 1; padding: 14px; border-radius: 10px; border: 1px solid #334155; 
            background: #1e293b; color: white; outline: none; font-size: 1rem;
        }
        .search-btn { background: var(--secondary); color: white; border: none; padding: 0 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }

        /* Trending Button (3. DIRECT LINK From Screenshot) */
        .trending-link {
            background:#ef4444; color:white; padding:12px 20px; 
            border-radius:8px; text-decoration:none; font-weight:bold; 
            font-size:0.85rem; display: inline-block; margin-bottom: 20px;
            transition: 0.3s ease;
        }
        .trending-link:hover { background: #dc2626; transform: translateY(-2px); }

        /* --- GRID LAYOUT (2 Columns) --- */
        #results-area {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px;
            margin-top: 20px;
        }

        .prompt-card { 
            background: var(--card-bg); border-radius: 15px; overflow: hidden; 
            display: flex; flex-direction: column; border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .image-box { position: relative; width: 100%; aspect-ratio: 1/1; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }

        .video-label { 
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); 
            color: #ff4d4d; border: 1px solid #ff4d4d; padding: 2px 8px; 
            border-radius: 5px; font-size: 10px; font-weight: bold; 
        }

        .content-box { padding: 12px; }
        .prompt-title { 
            font-size: 0.9rem; color: var(--text-muted); 
            margin-bottom: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* Card Buttons */
        .btn-group { display: flex; gap: 8px; }
        .btn-card { 
            flex: 1; padding: 10px 5px; border-radius: 8px; border: none; 
            font-size: 0.75rem; font-weight: 700; cursor: pointer; text-align: center;
            text-decoration: none; color: white; transition: 0.2s;
        }
        .copy-btn { background: #334155; }
        .watch-btn { background: var(--secondary); }
        .btn-card:active { transform: scale(0.95); }

        /* 4. NATIVE AD SLOT STYLING */
        .ad-container { 
            grid-column: span 2; 
            margin: 15px 0; 
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            min-height: 100px;
        }

        #toast { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: #10b981; color: white; padding: 12px 25px; 
            border-radius: 50px; display: none; z-index: 2000; font-weight: 600;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 10px; }
            #results-area { gap: 10px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">
        <img src="https://i.ibb.co/m5pXz1D/instagram-logo.png" alt="Logo"> AI PROMPT HUB
    </div>
    <div style="font-size: 1.5rem; cursor: pointer;">&#9776;</div>
</nav>

<div class="container">
    <header>
        <h1>Discover Premium Prompts</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Paste Instagram Link...">
            <button class="search-btn" onclick="handleSearch()">Search</button>
        </div>
        
        <a href="https://www.effectivegatecpm.com/z5q9i3x45w?key=06adf9977ec69fdce5fef572556a5d88" target="_blank" class="trending-link">
            🔥 TRENDING AI TOOLS (2026)
        </a>
    </header>

    <div id="results-area">
        </div>
</div>

<div id="toast">Copied to Clipboard!</div>

<script>
    let db = [];

    async function init() {
        try {
            const res = await fetch('./database.json');
            if(res.ok) {
                db = await res.json();
            } else {
                // Fallback sample data if file not found
                db = [{ "instagram": "https://instagram.com/", "data": [{ "image": "https://via.placeholder.com/500", "prompt": "Sample AI Prompt..." }] }];
            }
            renderData(db);
        } catch (e) { console.error("Error loading database"); }
    }

    function renderData(list) {
        const area = document.getElementById('results-area');
        area.innerHTML = '';
        
        let cardCounter = 0;

        list.forEach((user) => {
            user.data.forEach(item => {
                // 1. Render Prompt Card
                const card = document.createElement('div');
                card.className = 'prompt-card';
                card.innerHTML = `
                    <div class="image-box">
                        <span class="video-label">▶ REEL</span>
                        <img src="${item.image}" loading="lazy">
                    </div>
                    <div class="content-box">
                        <div class="prompt-title">/ prompt-text</div>
                        <div class="btn-group">
                            <button class="btn-card copy-btn" onclick="copyText(\`${item.prompt}\`)">Copy Prompt</button>
                            <a href="${user.instagram}" target="_blank" class="btn-card watch-btn">Watch Video</a>
                        </div>
                    </div>
                `;
                area.appendChild(card);
                cardCounter++;

                // 2. LOGIC: NATIVE AD AFTER EVERY 4 CARDS (From Screenshot Code)
                if (cardCounter % 4 === 0) {
                    const adDiv = document.createElement('div');
                    adDiv.className = 'ad-container';
                    
                    // Native Banner Script from 1000061352.jpg
                    const script = document.createElement('script');
                    script.async = true;
                    script.setAttribute('data-cfasync', 'false');
                    script.src = "//pl28750234.effectivegatecpm.com/15b9c32f55639f994ab49336ecb3dd5c/invoke.js";
                    
                    const container = document.createElement('div');
                    container.id = "container-15b9c32f55639f994ab49336ecb3dd5c";
                    
                    adDiv.appendChild(script);
                    adDiv.appendChild(container);
                    area.appendChild(adDiv);
                }
            });
        });
    }

    function handleSearch() {
        const val = document.getElementById('search-input').value.toLowerCase();
        const filtered = db.filter(u => u.instagram.toLowerCase().includes(val));
        renderData(filtered);
    }

    function copyText(txt) {
        navigator.clipboard.writeText(txt);
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    window.onload = init;
</script>

</body>
</html>
