<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Finder</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 1.5rem; }

        /* Header & Search */
        header { text-align: center; padding: 3rem 0; }
        h1 { font-size: 2.5rem; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        
        .search-box { max-width: 600px; margin: 0 auto; display: flex; gap: 10px; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; outline: none; }
        
        .btn { padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-explore { background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--glass-border); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* Results Area (Screenshot Style) */
        #results-area { margin-top: 40px; }
        .prompt-card { display: flex; margin-bottom: 25px; overflow: hidden; min-height: 220px; animation: fadeInUp 0.5s ease; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .image-side { width: 35%; position: relative; }
        .image-side img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        
        .video-label { 
            position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); 
            color: #ff4d4d; border: 1px solid #ff4d4d; padding: 4px 12px; 
            border-radius: 20px; font-size: 11px; font-weight: bold; text-decoration: none;
        }

        .content-side { width: 65%; padding: 20px; display: flex; flex-direction: column; justify-content: center; }
        .prompt-text { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; font-size: 14px; color: var(--text-muted); margin-bottom: 15px; }

        /* Modal / Detail View */
        #detail-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 100; overflow-y: auto; padding: 20px;
        }
        .modal-inner { max-width: 600px; margin: 40px auto; position: relative; }
        .modal-img { width: 100%; border-radius: 20px; margin-bottom: 20px; }

        @media (max-width: 700px) {
            .prompt-card { flex-direction: column; }
            .image-side, .content-side { width: 100%; }
            .image-side { height: 250px; }
        }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #10b981; padding: 10px 20px; border-radius: 30px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI Prompt Finder</h1>
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Paste Instagram URL...">
            <button class="btn btn-primary" onclick="handleSearch()">Search</button>
            <button class="btn btn-explore" onclick="renderData(allData)">Explore All</button>
        </div>
    </header>

    <div id="results-area"></div>

    <footer style="text-align: center; padding: 40px; opacity: 0.5; font-size: 12px;">
        © 2026 AI Prompt Hub | Strictly reading from database.json
    </footer>
</div>

<div id="detail-modal">
    <div class="modal-inner">
        <button onclick="closeModal()" style="position: absolute; right: 0; top: -40px; background: none; border: none; color: white; font-size: 30px; cursor: pointer;">&times;</button>
        <div id="modal-content"></div>
    </div>
</div>

<div id="toast">Copied to Clipboard!</div>

<script>
    let allData = [];

    // 1. Database Load Karna (Sirf yahan se data aayega)
    async function loadDatabase() {
        try {
            const response = await fetch('./database.json');
            allData = await response.json();
            console.log("Data Loaded successfully");
            renderData(allData); // Start mein sab dikhayega
        } catch (error) {
            document.getElementById('results-area').innerHTML = "<p style='text-align:center;'>Error: database.json file nahi mili!</p>";
        }
    }

    // 2. Card Render Karna (Screenshot Style)
    function renderData(dataToShow) {
        const container = document.getElementById('results-area');
        container.innerHTML = '';

        if (dataToShow.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>No results found.</p>";
            return;
        }

        dataToShow.forEach(entry => {
            entry.data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'prompt-card glass';
                card.innerHTML = `
                    <div class="image-side">
                        <a href="${entry.instagram}" target="_blank" class="video-label">▶ WATCH VIDEO</a>
                        <img src="${item.image}" alt="AI Image" onclick="openDetail('${item.image}', \`${item.prompt}\`, '${entry.instagram}')">
                    </div>
                    <div class="content-side">
                        <h3 style="margin-bottom:10px; font-size: 18px;">AI Art Design</h3>
                        <div class="prompt-text">${item.prompt}</div>
                        <button class="btn btn-primary" style="width: fit-content;" onclick="copyText(\`${item.prompt}\`)">Copy Prompt</button>
                    </div>
                `;
                container.appendChild(card);
            });
        });
    }

    // 3. Search Logic
    function handleSearch() {
        const val = document.getElementById('search-input').value.toLowerCase().trim();
        if(!val) { renderData(allData); return; }
        
        const filtered = allData.filter(item => item.instagram.toLowerCase().includes(val));
        renderData(filtered);
    }

    // 4. Modal (Detail View)
    function openDetail(img, prompt, url) {
        const modal = document.getElementById('detail-modal');
        const content = document.getElementById('modal-content');
        content.innerHTML = `
            <img src="${img}" class="modal-img">
            <a href="${url}" target="_blank" class="btn btn-explore" style="display:block; text-align:center; color:#ff4d4d; border-color:#ff4d4d; margin-bottom:15px;">▶ Instagram Video Link</a>
            <div class="glass" style="padding: 20px;">
                <p style="color:var(--text-muted); margin-bottom:20px;">${prompt}</p>
                <button class="btn btn-primary" style="width:100%" onclick="copyText(\`${prompt}\`)">Copy This Prompt</button>
            </div>
        `;
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('detail-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function copyText(txt) {
        navigator.clipboard.writeText(txt);
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    window.onload = loadDatabase;
</script>

</body>
</html>
